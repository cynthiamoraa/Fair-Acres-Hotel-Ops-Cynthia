services:
  # Backend API Service
  - type: web
    name: fair-acres-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: fair-acres-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://fair-acres-frontend.onrender.com
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: fair-acres-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://fair-acres-backend.onrender.com

databases:
  # PostgreSQL Database
  - name: fair-acres-db
    databaseName: fair_acres
    user: fair_acres_user
